name: Analyze Logs with Devin Playbook

on:
  push:
    paths:
      - 'logs/**'

jobs:
  detect-changed-logs:
    runs-on: ubuntu-latest
    outputs:
      changed_files: ${{ steps.detect.outputs.changed_files }}
      has_changes: ${{ steps.detect.outputs.has_changes }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed log files
        id: detect
        run: |
          echo "=== Detecting changed log files ==="
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD -- 'logs/*.json' || true)
          if [ -z "$CHANGED_FILES" ]; then
            echo "No changed log files detected"
            echo "changed_files=" >> $GITHUB_OUTPUT
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            # Convert newlines to spaces for passing between jobs
            FILES_SINGLE_LINE=$(echo "$CHANGED_FILES" | tr '\n' ' ')
            echo "changed_files=$FILES_SINGLE_LINE" >> $GITHUB_OUTPUT
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changed files:"
            echo "$CHANGED_FILES"
          fi

  trigger-playbook:
    needs: detect-changed-logs
    if: needs.detect-changed-logs.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Trigger Devin playbook for log analysis
        env:
          DEVIN_API_KEY: ${{ secrets.DEVIN_API_KEY }}
        run: |
          CHANGED_FILES="${{ needs.detect-changed-logs.outputs.changed_files }}"
          for LOG_FILE in $CHANGED_FILES; do
            echo "=== Processing $LOG_FILE with playbook ==="
            export LOG_FILE
            python3 << 'PYEOF'
          import json, os
          from urllib.request import Request, urlopen

          api_key = os.environ.get("DEVIN_API_KEY")
          log_file = os.environ.get("LOG_FILE", "")

          payload = {
              "prompt": f"@elastic_logs Run playbook !logs_analysis on {log_file}. Follow coding guidelines !coding-guidelines. Save all HTML reports to analysis/ folder."
          }

          data = json.dumps(payload).encode('utf-8')
          request = Request(
              "https://api.devin.ai/v1/sessions",
              data=data,
              headers={
                  "Authorization": f"Bearer {api_key}",
                  "Content-Type": "application/json",
              },
              method="POST"
          )

          with urlopen(request, timeout=30) as response:
              result = json.loads(response.read().decode('utf-8'))
              print(f"  Playbook session: {result['url']}")
          PYEOF
          done
