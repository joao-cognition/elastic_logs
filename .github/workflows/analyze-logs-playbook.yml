# Migrated from GoCD pipeline "analyze-logs-playbook"
# Source: gocd/cruise-config.xml (lines 447-576)
#
# Changes from GoCD:
#   - Trigger: git material filter + 5-min polling timer -> on.push.paths
#   - Encrypted DEVIN_API_KEY -> GitHub Secrets
#   - GoCD artifacts -> GitHub Actions artifacts

name: Analyze Logs Playbook

on:
  push:
    paths:
      - 'logs/**/*.json'

env:
  DEVIN_API_URL: https://api.devin.ai/v1/sessions
  REPORTS_DIR: analysis

jobs:
  # Job 1: Detect which log files changed
  # Mirrors GoCD Stage 1 (lines 481-512)
  detect-changed-logs:
    runs-on: ubuntu-latest
    outputs:
      has_files: ${{ steps.detect.outputs.has_files }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed log files
        id: detect
        run: |
          echo "=== Detecting changed log files ==="
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD -- 'logs/**/*.json' || true)
          if [ -z "$CHANGED_FILES" ]; then
            echo "No changed log files detected"
            echo "" > changed_files.txt
            echo "has_files=false" >> "$GITHUB_OUTPUT"
          else
            echo "$CHANGED_FILES" > changed_files.txt
            echo "Changed files:"
            cat changed_files.txt
            echo "has_files=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload changed files list
        uses: actions/upload-artifact@v4
        with:
          name: metadata
          path: changed_files.txt

  # Job 2: Trigger Devin playbook for each changed log file
  # Mirrors GoCD Stage 2 (lines 514-574)
  trigger-playbook:
    needs: detect-changed-logs
    if: needs.detect-changed-logs.outputs.has_files == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DEVIN_API_KEY: ${{ secrets.DEVIN_API_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download changed files list
        uses: actions/download-artifact@v4
        with:
          name: metadata

      - name: Trigger playbook analysis
        run: |
          CHANGED_FILES=$(cat changed_files.txt)
          if [ -z "$CHANGED_FILES" ]; then
            echo "No files to process, skipping"
            exit 0
          fi
          for LOG_FILE in $CHANGED_FILES; do
            echo "=== Processing $LOG_FILE with playbook ==="
            export LOG_FILE
            python3 << 'PYEOF'
          import json, os
          from urllib.request import Request, urlopen

          api_key = os.environ.get("DEVIN_API_KEY")
          log_file = os.environ.get("LOG_FILE", "")

          payload = {
              "prompt": f"@elastic_logs Run playbook !logs_analysis on {log_file}. Follow coding guidelines !coding-guidelines. Save all HTML reports to analysis/ folder."
          }

          data = json.dumps(payload).encode('utf-8')
          request = Request(
              os.environ["DEVIN_API_URL"],
              data=data,
              headers={
                  "Authorization": f"Bearer {api_key}",
                  "Content-Type": "application/json",
              },
              method="POST"
          )

          with urlopen(request, timeout=30) as response:
              result = json.loads(response.read().decode('utf-8'))
              print(f"  Playbook session: {result['url']}")
          PYEOF
          done
