# Migrated from GoCD pipeline "analyze-logs-on-new-file"
# Source: gocd/cruise-config.xml (lines 113-438)
#
# Changes from GoCD:
#   - Trigger: git material filter + 5-min polling timer -> on.push.paths
#   - Encrypted DEVIN_API_KEY -> GitHub Secrets
#   - GoCD artifacts -> GitHub Actions artifacts
#   - analyze-errors, analyze-performance, analyze-security run in parallel
#     (GoCD ran them sequentially due to agent limitations, see config line 110)

name: Analyze Logs on New File

on:
  push:
    paths:
      - 'logs/**/*.json'

env:
  DEVIN_API_URL: https://api.devin.ai/v1/sessions
  REPORTS_DIR: analysis
  LOGS_DIR: logs

jobs:
  # Job 1: Detect which log files changed in the latest commit
  # Mirrors GoCD Stage 1 (lines 151-182)
  detect-changed-logs:
    runs-on: ubuntu-latest
    outputs:
      has_files: ${{ steps.detect.outputs.has_files }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed log files
        id: detect
        run: |
          echo "=== Detecting changed log files ==="
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD -- 'logs/**/*.json' || true)
          if [ -z "$CHANGED_FILES" ]; then
            echo "No changed log files detected"
            echo "" > changed_files.txt
            echo "has_files=false" >> "$GITHUB_OUTPUT"
          else
            echo "$CHANGED_FILES" > changed_files.txt
            echo "Changed files:"
            cat changed_files.txt
            echo "has_files=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload changed files list
        uses: actions/upload-artifact@v4
        with:
          name: metadata
          path: changed_files.txt

  # Job 2: Validate that log files are well-formed JSON
  # Mirrors GoCD Stage 2 (lines 184-223)
  validate-logs:
    needs: detect-changed-logs
    if: needs.detect-changed-logs.outputs.has_files == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download changed files list
        uses: actions/download-artifact@v4
        with:
          name: metadata

      - name: Validate JSON log files
        run: |
          CHANGED_FILES=$(cat changed_files.txt)
          if [ -z "$CHANGED_FILES" ]; then
            echo "No files to validate, skipping"
            exit 0
          fi
          echo "=== Validating JSON log files ==="
          for file in $CHANGED_FILES; do
            if [ ! -f "$file" ]; then
              echo "ERROR: File not found: $file"
              exit 1
            fi
            python3 -c "import json; json.load(open('$file'))" || exit 1
            echo "Validated: $file"
          done

  # Job 3: Run error analysis via Devin API
  # Mirrors GoCD Stage 3 (lines 225-294)
  analyze-errors:
    needs: validate-logs
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DEVIN_API_KEY: ${{ secrets.DEVIN_API_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download changed files list
        uses: actions/download-artifact@v4
        with:
          name: metadata

      - name: Run error analysis
        run: |
          CHANGED_FILES=$(cat changed_files.txt)
          if [ -z "$CHANGED_FILES" ]; then
            echo "No files to analyze, skipping"
            exit 0
          fi
          TIMESTAMP=$(date -u +"%Y%m%d_%H%M%S")
          for LOG_FILE in $CHANGED_FILES; do
            echo "=== Error analysis on $LOG_FILE ==="
            export LOG_FILE TIMESTAMP
            python3 << 'PYEOF'
          import json, os, time
          from urllib.request import Request, urlopen
          from urllib.error import HTTPError, URLError

          api_key = os.environ.get("DEVIN_API_KEY")
          log_file = os.environ.get("LOG_FILE", "")
          timestamp = os.environ.get("TIMESTAMP", "")

          prompt = f"@elastic_logs Read {log_file}. Count all entries with level='ERROR'. Group by: status_code, service_name, error_message. List top 10 most frequent errors. Save as error_report_{timestamp}.html in analysis/"

          payload = {"prompt": prompt}
          data = json.dumps(payload).encode('utf-8')
          request = Request(
              os.environ["DEVIN_API_URL"],
              data=data,
              headers={"Authorization": f"Bearer {api_key}", "Content-Type": "application/json"},
              method="POST"
          )

          max_retries = 3
          for attempt in range(max_retries):
              try:
                  with urlopen(request, timeout=60) as response:
                      result = json.loads(response.read().decode('utf-8'))
                      print(f"  error: {result['url']}")
                      break
              except (HTTPError, URLError) as e:
                  if attempt < max_retries - 1:
                      print(f"  Retry {attempt + 1}/{max_retries}: {e}")
                      time.sleep(2 ** attempt)
                  else:
                      raise
          PYEOF
          done

  # Job 4: Run performance analysis via Devin API
  # Mirrors GoCD Stage 4 (lines 296-365)
  # Note: Runs in parallel with analyze-errors and analyze-security
  # (GoCD ran these sequentially due to agent limitations, see config line 110)
  analyze-performance:
    needs: validate-logs
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DEVIN_API_KEY: ${{ secrets.DEVIN_API_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download changed files list
        uses: actions/download-artifact@v4
        with:
          name: metadata

      - name: Run performance analysis
        run: |
          CHANGED_FILES=$(cat changed_files.txt)
          if [ -z "$CHANGED_FILES" ]; then
            echo "No files to analyze, skipping"
            exit 0
          fi
          TIMESTAMP=$(date -u +"%Y%m%d_%H%M%S")
          for LOG_FILE in $CHANGED_FILES; do
            echo "=== Performance analysis on $LOG_FILE ==="
            export LOG_FILE TIMESTAMP
            python3 << 'PYEOF'
          import json, os, time
          from urllib.request import Request, urlopen
          from urllib.error import HTTPError, URLError

          api_key = os.environ.get("DEVIN_API_KEY")
          log_file = os.environ.get("LOG_FILE", "")
          timestamp = os.environ.get("TIMESTAMP", "")

          prompt = f"@elastic_logs Read {log_file}. Calculate response_time stats: min, max, avg, p95, p99. List slowest 10 endpoints. Identify any response_time > 1000ms. Save as performance_report_{timestamp}.html in analysis/"

          payload = {"prompt": prompt}
          data = json.dumps(payload).encode('utf-8')
          request = Request(
              os.environ["DEVIN_API_URL"],
              data=data,
              headers={"Authorization": f"Bearer {api_key}", "Content-Type": "application/json"},
              method="POST"
          )

          max_retries = 3
          for attempt in range(max_retries):
              try:
                  with urlopen(request, timeout=60) as response:
                      result = json.loads(response.read().decode('utf-8'))
                      print(f"  performance: {result['url']}")
                      break
              except (HTTPError, URLError) as e:
                  if attempt < max_retries - 1:
                      print(f"  Retry {attempt + 1}/{max_retries}: {e}")
                      time.sleep(2 ** attempt)
                  else:
                      raise
          PYEOF
          done

  # Job 5: Run security analysis via Devin API
  # Mirrors GoCD Stage 5 (lines 367-436)
  analyze-security:
    needs: validate-logs
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DEVIN_API_KEY: ${{ secrets.DEVIN_API_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download changed files list
        uses: actions/download-artifact@v4
        with:
          name: metadata

      - name: Run security analysis
        run: |
          CHANGED_FILES=$(cat changed_files.txt)
          if [ -z "$CHANGED_FILES" ]; then
            echo "No files to analyze, skipping"
            exit 0
          fi
          TIMESTAMP=$(date -u +"%Y%m%d_%H%M%S")
          for LOG_FILE in $CHANGED_FILES; do
            echo "=== Security analysis on $LOG_FILE ==="
            export LOG_FILE TIMESTAMP
            python3 << 'PYEOF'
          import json, os, time
          from urllib.request import Request, urlopen
          from urllib.error import HTTPError, URLError

          api_key = os.environ.get("DEVIN_API_KEY")
          log_file = os.environ.get("LOG_FILE", "")
          timestamp = os.environ.get("TIMESTAMP", "")

          prompt = f"@elastic_logs Read {log_file}. Find: status_code=401/403 entries, unique IPs with >10 failed requests, any SQL/XSS patterns in request_path. Save as security_report_{timestamp}.html in analysis/"

          payload = {"prompt": prompt}
          data = json.dumps(payload).encode('utf-8')
          request = Request(
              os.environ["DEVIN_API_URL"],
              data=data,
              headers={"Authorization": f"Bearer {api_key}", "Content-Type": "application/json"},
              method="POST"
          )

          max_retries = 3
          for attempt in range(max_retries):
              try:
                  with urlopen(request, timeout=60) as response:
                      result = json.loads(response.read().decode('utf-8'))
                      print(f"  security: {result['url']}")
                      break
              except (HTTPError, URLError) as e:
                  if attempt < max_retries - 1:
                      print(f"  Retry {attempt + 1}/{max_retries}: {e}")
                      time.sleep(2 ** attempt)
                  else:
                      raise
          PYEOF
          done
